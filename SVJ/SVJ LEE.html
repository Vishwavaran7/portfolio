<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-color: #020817;
  --gold: #D4AF37;
  --gold-glow: rgba(212, 175, 55, 0.4);
  --text-primary: #F5F5F7;
  --text-secondary: rgba(245, 245, 247, 0.6);
  --glass: rgba(15, 23, 42, 0.8);
  --border: rgba(212, 175, 55, 0.2);
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: var(--bg-color);
  font-family: 'Inter', 'Noto Sans HK', sans-serif;
  color: var(--text-primary);
}

.bg {
  position: fixed; inset: 0; z-index: 0;
  background: 
    radial-gradient(circle at 20% 30%, rgba(21, 35, 65, 0.8) 0%, transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(10, 20, 45, 0.8) 0%, transparent 50%),
    var(--bg-color);
}

.screen {
  position: relative; z-index: 1;
  width: 100vw; height: 100vh;
  display: flex; flex-direction: column;
}

/* ── HEADER ── */
.header {
  flex-shrink: 0;
  padding: 15px 40px;
  background: var(--glass);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
}

.header-left {
  display: flex;
  align-items: center;
  gap: 25px;
}

.logo-container {
  width: 70px;
  height: 70px;
  position: relative;
}

.logo-svg {
  width: 100%;
  height: 100%;
  filter: drop-shadow(0 0 10px var(--gold-glow));
}

.titles {
  display: flex;
  flex-direction: column;
}

.co-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.8vw;
  font-weight: 900;
  color: var(--gold);
  letter-spacing: 0.5px;
  line-height: 1.2;
  padding-bottom: 4px;
  text-transform: uppercase;
  background: linear-gradient(to right, #D4AF37, #F2D57E, #D4AF37);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.zh-title {
  font-family: 'Noto Sans HK', sans-serif;
  font-size: 1.3vw;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: 12px;
  margin-top: 5px;
  opacity: 0.9;
}

.header-right {
  text-align: right;
}

.tagline {
  font-size: 0.9vw;
  text-transform: uppercase;
  letter-spacing: 4px;
  color: var(--gold);
  margin-bottom: 5px;
  font-weight: 600;
}

.location-tag {
  font-size: 0.75vw;
  letter-spacing: 2px;
  color: var(--text-secondary);
  margin-top: 4px;
}

.search-box {
  margin-top: 15px;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 10px;
}

.search-input {
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 15px;
  color: var(--gold);
  font-size: 0.7vw;
  width: 180px;
  outline: none;
  transition: all 0.3s ease;
}

.search-input:focus {
  background: rgba(255, 255, 255, 0.1);
  border-color: var(--gold);
  box-shadow: 0 0 10px var(--gold-glow);
}

.compliance-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(212, 175, 55, 0.1);
  border: 1px solid var(--border);
  padding: 4px 12px;
  border-radius: 100px;
  font-size: 0.65vw;
  color: var(--gold);
  margin-top: 15px;
  letter-spacing: 1px;
}

.status-dot {
  width: 6px;
  height: 6px;
  background: var(--gold);
  border-radius: 50%;
  box-shadow: 0 0 8px var(--gold);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.5); opacity: 0.5; }
  100% { transform: scale(1); opacity: 1; }
}

.services-tag {
  font-size: 0.7vw;
  font-style: italic;
  letter-spacing: 1.5px;
  color: var(--gold);
  margin-top: 6px;
  opacity: 0.8;
  font-weight: 500;
  text-transform: uppercase;
}

.header-line {
  width: 100%;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border), transparent);
  margin: 6px 0;
}

/* ── COLUMNS ── */
.cols-area {
  flex: 1;
  display: flex;
  padding: 0 20px;
  overflow: hidden;
  position: relative;
}

/* Removed overlay gradients to ensure all company cards at the top and bottom are fully visible */

.col-box {
  flex: 1;
  overflow: hidden;
  position: relative;
  padding: 20px 10px;
}

.col-inner {
  position: absolute;
  top: 20px;
  bottom: 20px;
  left: 10px;
  right: 10px;
}

.page-layer {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: grid;
  grid-template-rows: repeat(9, 1fr);
  grid-gap: 10px;
  opacity: 0;
  transition: opacity 0.8s ease-in-out;
  pointer-events: none;
}

.page-layer.active {
  opacity: 1;
  pointer-events: auto;
}

.co {
  padding: 6px 16px;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.06);
  border-radius: 8px;
  transition: transform 0.5s ease, background-color 0.5s ease, border-color 0.5s ease;
  display: flex;
  flex-direction: column;
  justify-content: center;
  overflow: hidden;
}

/* Highlight effect styles removed as requested */

.co-en {
  display: block;
  font-size: 0.85vw;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 2px;
  line-height: 1.1;
}

.co-zh {
  display: block;
  font-size: 0.7vw;
  color: var(--gold);
  opacity: 0.8;
  font-weight: 500;
  line-height: 1.1;
}

/* ── FOOTER ── */
.footer {
  flex-shrink: 0;
  padding: 5px 60px;
  background: var(--glass);
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: flex-end;
}

.f-clock {
  font-family: 'Playfair Display', serif;
  font-size: 1.4vw;
  color: var(--gold);
  font-weight: 900;
  letter-spacing: 2px;
  line-height: 1;
  text-align: right;
  display: flex;
  flex-direction: column;
}

.f-stats {
  font-size: 0.9vw;
  color: var(--text-secondary);
  letter-spacing: 1px;
}

.f-stats strong {
  color: var(--gold);
  font-size: 1.1vw;
}

.gold-line {
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  width: 100%;
}
</style>

// Filter out any blank objects (if any) to clean the list
var cleanCompanies = [];
for (var i = 0; i < companies.length; i++) {
  if (companies[i] && (companies[i].en || companies[i].zh)) {
    cleanCompanies.push(companies[i]);
  }
}

// Automatically calculate the optimal number of pages and distribute elements evenly
// so that all slides are full and there is no empty last slide.
var PAGE_DURATION = 12000; // 12 seconds per page

// We will fit the companies into exactly N pages, where each page has 25 or 26 items,
// preventing an empty last page of only 7 items!
var totalPages = Math.ceil(cleanCompanies.length / 26); 
var pages = [];
var remainingItems = cleanCompanies.length;
var itemIndex = 0;

for (var p = 0; p < totalPages; p++) {
  var pagesLeft = totalPages - p;
  var itemsForThisPage = Math.ceil(remainingItems / pagesLeft);
  
  var pageData = cleanCompanies.slice(itemIndex, itemIndex + itemsForThisPage);
  pages.push(pageData);
  
  itemIndex += itemsForThisPage;
  remainingItems -= itemsForThisPage;
}

var currentPage = 0;
var colL = document.getElementById("col-l");
var colM = document.getElementById("col-m");
var colR = document.getElementById("col-r");

function buildColHTML(data) {
  var html = "";
  for (var i = 0; i < data.length; i++) {
    var c = data[i];
    html += '<div class="co">' +
            '<span class="co-en">' + c.en + '</span>' +
            (c.zh ? '<span class="co-zh">' + c.zh + '</span>' : "") +
            '</div>';
  }
  return html;
}

// Pre-render all pages to prevent memory leaks on Smart TVs
for (var p = 0; p < totalPages; p++) {
  var pageData = pages[p];
  var colLSize = Math.ceil(pageData.length / 3);
  var colMSize = Math.ceil((pageData.length - colLSize) / 2);
  
  var colLData = pageData.slice(0, colLSize);
  var colMData = pageData.slice(colLSize, colLSize + colMSize);
  var colRData = pageData.slice(colLSize + colMSize);
  
  var divL = document.createElement("div");
  divL.className = "page-layer";
  divL.innerHTML = buildColHTML(colLData);
  colL.appendChild(divL);
  
  var divM = document.createElement("div");
  divM.className = "page-layer";
  divM.innerHTML = buildColHTML(colMData);
  colM.appendChild(divM);
  
  var divR = document.createElement("div");
  divR.className = "page-layer";
  divR.innerHTML = buildColHTML(colRData);
  colR.appendChild(divR);
}

function showPage(pageIndex) {
  var layersL = colL.getElementsByClassName("page-layer");
  var layersM = colM.getElementsByClassName("page-layer");
  var layersR = colR.getElementsByClassName("page-layer");
  
  for (var i = 0; i < totalPages; i++) {
    if (i === pageIndex) {
      layersL[i].classList.add("active");
      layersM[i].classList.add("active");
      layersR[i].classList.add("active");
    } else {
      layersL[i].classList.remove("active");
      layersM[i].classList.remove("active");
      layersR[i].classList.remove("active");
    }
  }
}

function nextPage() {
  currentPage = (currentPage + 1) % totalPages;
  showPage(currentPage);
}

// Initial render
showPage(0);

// Rotate page every X seconds
var rotationInterval = setInterval(nextPage, PAGE_DURATION);

function tick() {
  var now = new Date();
  var timeStr = now.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: true });
  var parts = timeStr.split(" ");
  document.getElementById("clock-time").textContent = parts[0];
  document.getElementById("clock-ampm").textContent = parts[1];
}
setInterval(tick, 1000);
tick();
